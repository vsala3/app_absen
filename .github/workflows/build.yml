name: Flutter Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # PERBAIKAN: Jangan pakai --major-versions karena merusak dependensi local_auth di main.dart
      - name: Install Dependencies
        run: |
          rm -f pubspec.lock
          flutter pub get

      # PERBAIKAN PROGUARD: Flag bypass diimplementasikan langsung saat build untuk menghindari kegagalan AGP validation
      - name: Build APK Release
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk